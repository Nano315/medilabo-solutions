server:
  port: 8081

spring:
  application:
    name: gateway
  cloud:
    gateway:
      mvc:
        cors:
          configurations:
            '[/**]':
              allowedOrigins: "http://localhost:4200"
              allowedMethods: "*"
              allowedHeaders: "*"
              allowCredentials: true
      server:
        webmvc:
          routes:
            - id: patient-service
              uri: ${PATIENT_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/patients,/api/patients/**
            - id: note-service
              uri: ${NOTE_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/notes/**
            - id: assessment-service
              uri: ${ASSESSMENT_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/assessment/**
