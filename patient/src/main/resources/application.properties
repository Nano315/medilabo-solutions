# Database Configuration (MySQL Example)
spring.datasource.url=jdbc:mysql://localhost:3306/patient_db?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# To use PostgreSQL instead, you can uncomment these lines and adapt:
# spring.datasource.url=jdbc:postgresql://localhost:5432/patient_db
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
# Updates schema automatically
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true

# Better readability of generated SQL
spring.jpa.properties.hibernate.format_sql=true

spring.security.user.name=admin
spring.security.user.password=admin